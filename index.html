<!DOCTYPE html>
<html>
<head>
  <title>File Upload Download</title>
</head>
<body>

<h2>Upload File</h2>
<input type="file" id="fileInput">
<button onclick="uploadFile()">Upload</button>

<h2>Download File</h2>
<input type="text" id="fileName" placeholder="Enter file name">
<button onclick="downloadFile()">Download</button>

<!-- Supabase CDN -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
// 👇 YAHAN APNI DETAILS DAAL
const supabaseClient = supabase.createClient(
  "https://rxwonimvgjvecwrwehmb.supabase.co",
  "sb_publishable_j0ck75fd0t8uIA40AhhFJw_YqfDCPHs"
);

// ✅ Upload
async function uploadFile() {
  const file = document.getElementById('fileInput').files[0];

  if (!file) {
    alert("File select kar pehle");
    return;
  }

  const { error } = await supabaseClient.storage
    .from('files')
    .upload(file.name, file, {
      upsert: true   // same file ko overwrite karega
    });

  if (error) {
    alert("Upload error: " + error.message);
  } else {
    alert("Upload ho gaya!");
  }
}

// ✅ Download
async function downloadFile() {
  const name = document.getElementById('fileName').value;

  if (!name) {
    alert("File name daal");
    return;
  }

  const { data } = supabaseClient.storage
    .from('files')
    .getPublicUrl(name);

  if (data && data.publicUrl) {
    window.open(data.publicUrl);
  } else {
    alert("File nahi mili");
  }
}
</script>

</body>
</html>
