<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mera Mood Detector</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #0f0f0f;
      color: white;
      margin: 0;
      padding: 20px;
    }
    h1 {
      margin: 20px 0;
      font-size: 2.5em;
    }
    .container {
      position: relative;
      display: inline-block;
      margin: 20px auto;
      border: 4px solid #00ff88;
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
    }
    #video, #canvas {
      width: 640px;
      height: 480px;
    }
    #result {
      margin: 25px auto;
      padding: 15px;
      background: #1e1e1e;
      border-radius: 12px;
      max-width: 600px;
      font-size: 1.8em;
    }
    button {
      padding: 15px 30px;
      font-size: 1.3em;
      background: #00ff88;
      color: black;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px;
    }
    button:hover {
      background: #00cc66;
    }
    #status {
      margin-top: 15px;
      font-size: 1.1em;
      color: #aaa;
    }
  </style>
</head>
<body>
  <h1>😀 Mera Mood Detector</h1>
  
  <div class="container">
    <video id="video" width="640" height="480" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <div id="result">
    <h2>Current Mood: <span id="mood">Button dabao shuru karne ke liye</span></h2>
    <p id="confidence"></p>
  </div>

  <button onclick="startCamera()">📸 Camera Start Karo</button>
  <button onclick="stopCamera()">⛔ Camera Band Karo</button>

  <div id="status">Status: Ready</div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const moodText = document.getElementById('mood');
    const confidenceText = document.getElementById('confidence');
    const statusText = document.getElementById('status');

    let currentStream = null;
    let detectionInterval = null;
    let modelsLoaded = false;

    // Models load karne ka function
    async function loadModels() {
      if (modelsLoaded) return;
      
      statusText.textContent = "Status: Models download ho rahe hain... (pehle baar thoda time lagega)";
      
      const MODEL_URL = "https://justadudewhohacks.github.io/face-api.js/models";
      
      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
        ]);
        
        modelsLoaded = true;
        statusText.textContent = "Status: Models loaded successfully ✅";
        console.log("✅ All models loaded");
      } catch (err) {
        statusText.textContent = "Status: Models load karne mein error!";
        console.error(err);
        alert("Models load nahi ho paye. Internet check karo aur page refresh karo.");
      }
    }

    // Camera start
    async function startCamera() {
      if (currentStream) {
        stopCamera();
      }

      try {
        statusText.textContent = "Status: Camera access maang raha hoon...";
        
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { 
            facingMode: "user",
            width: 640,
            height: 480
          }
        });
        
        currentStream = stream;
        video.srcObject = stream;
        
        await video.play();
        
        // Models load karo (agar nahi load hue)
        await loadModels();
        
        // Detection shuru karo
        startDetection();
        
        statusText.textContent = "Status: Camera chal raha hai | Face detect ho raha hai...";
      } catch (err) {
        statusText.textContent = "Status: Camera access denied!";
        alert("Camera permission nahi mila. Browser settings mein allow karo.");
        console.error(err);
      }
    }

    // Detection loop
    function startDetection() {
      if (detectionInterval) clearInterval(detectionInterval);

      const displaySize = { width: video.width, height: video.height };
      faceapi.matchDimensions(canvas, displaySize);

      detectionInterval = setInterval(async () => {
        if (!modelsLoaded) return;

        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
          .withFaceLandmarks()
          .withFaceExpressions();

        const resizedDetections = faceapi.resizeResults(detections, displaySize);

        // Canvas pe draw karo
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        faceapi.draw.drawDetections(canvas, resizedDetections);
        faceapi.draw.drawFaceLandmarks(canvas, resizedDetections);

        if (detections.length > 0) {
          const expressions = detections[0].expressions;
          
          // Sabse strong emotion
          let maxEmotion = Object.keys(expressions).reduce((a, b) => 
            expressions[a] > expressions[b] ? a : b
          );

          let confidence = (expressions[maxEmotion] * 100).toFixed(1);

          const emotionMap = {
            happy: "😊 Khush",
            sad: "😢 Udaas",
            angry: "😠 Gussa",
            surprised: "😲 Hairaan",
            neutral: "😐 Normal",
            fearful: "😨 Dar",
            disgusted: "🤢 Ghrena"
          };

          moodText.textContent = emotionMap[maxEmotion] || maxEmotion.toUpperCase();
          confidenceText.innerHTML = `Confidence: <strong>${confidence}%</strong>`;
        } else {
          moodText.textContent = "Face nahi dikhai de raha";
          confidenceText.innerHTML = "";
        }
      }, 80); // smooth detection
    }

    // Camera band karo
    function stopCamera() {
      if (detectionInterval) {
        clearInterval(detectionInterval);
        detectionInterval = null;
      }
      if (currentStream) {
        currentStream.getTracks().forEach(track => track.stop());
        currentStream = null;
      }
      video.srcObject = null;
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      
      moodText.textContent = "Camera band hai";
      statusText.textContent = "Status: Camera stopped";
    }

    // Page load hone pe
    window.onload = () => {
      statusText.textContent = "Status: Ready | Camera Start button dabao";
    };

    // Cleanup jab page band ho
    window.onbeforeunload = stopCamera;
  </script>
</body>
</html>
