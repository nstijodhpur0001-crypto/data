<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mera Mood Detector</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/face-api.js/0.22.2/face-api.min.js"></script>
  <style>
    body { font-family: Arial, sans-serif; text-align: center; background: #0f0f0f; color: white; margin: 0; padding: 20px; }
    h1 { margin: 20px 0; font-size: 2.5em; }
    .container { position: relative; display: inline-block; margin: 20px auto; border: 5px solid #00ff88; border-radius: 15px; overflow: hidden; box-shadow: 0 0 25px rgba(0,255,136,0.6); }
    #video, #canvas { width: 640px; height: 480px; }
    #result { margin: 25px auto; padding: 20px; background: #1e1e1e; border-radius: 12px; max-width: 650px; font-size: 1.6em; }
    button { padding: 15px 30px; font-size: 1.3em; background: #00ff88; color: black; border: none; border-radius: 10px; cursor: pointer; margin: 10px; }
    button:hover { background: #00cc66; }
    #status { margin-top: 15px; font-size: 1.2em; color: #aaa; }
    .probs { font-size: 1em; color: #00ffcc; margin-top: 10px; text-align: left; display: inline-block; }
  </style>
</head>
<body>
  <h1>😀 Mera Mood Detector</h1>
  
  <div class="container">
    <video id="video" width="640" height="480" autoplay muted playsinline></video>
    <canvas id="canvas" width="640" height="480"></canvas>
  </div>

  <div id="result">
    <h2>Current Mood: <span id="mood">Camera start karo...</span></h2>
    <p id="confidence"></p>
    <div id="probs" class="probs"></div>
  </div>

  <button onclick="startCamera()">📸 Camera Start Karo</button>
  <button onclick="stopCamera()">⛔ Camera Band Karo</button>

  <div id="status">Status: Ready - Button dabao</div>

  <script>
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const moodText = document.getElementById('mood');
    const confidenceText = document.getElementById('confidence');
    const probsText = document.getElementById('probs');
    const statusText = document.getElementById('status');

    let currentStream = null;
    let detectionInterval = null;
    let modelsLoaded = false;

    const emotionMap = {
      happy: "😊 Khush",
      sad: "😢 Udaas",
      angry: "😠 Gussa",
      surprised: "😲 Hairaan",
      neutral: "😐 Normal",
      fearful: "😨 Dar",
      disgusted: "🤢 Ghrena"
    };

    async function loadModels() {
      if (modelsLoaded) return;
      
      statusText.textContent = "Status: Models download ho rahe hain... (10-20 seconds lag sakte hain pehli baar)";
      
      // Updated reliable URLs
      const MODEL_URL = "https://cdn.jsdelivr.net/gh/justadudewhohacks/face-api.js@master/weights";

      try {
        await Promise.all([
          faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
          faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
          faceapi.nets.faceExpressionNet.loadFromUri(MODEL_URL)
        ]);
        
        modelsLoaded = true;
        statusText.textContent = "✅ Models loaded! Ab apna face camera mein dikhao";
        console.log("Models successfully loaded");
      } catch (err) {
        console.error(err);
        statusText.textContent = "❌ Models load nahi hue. Internet check karo aur page refresh karo.";
        alert("Models download mein problem aa rahi hai. Internet fast ho aur page refresh kar ke try karo.");
      }
    }

    async function startCamera() {
      stopCamera(); // pehle clean karo

      try {
        statusText.textContent = "Status: Camera khol raha hoon...";
        
        const stream = await navigator.mediaDevices.getUserMedia({ 
          video: { facingMode: "user", width: 640, height: 480 } 
        });
        
        currentStream = stream;
        video.srcObject = stream;
        await video.play();

        await loadModels();
        startDetection();

      } catch (err) {
        console.error(err);
        statusText.textContent = "❌ Camera permission nahi mila ya error hai";
        alert("Camera allow nahi kiya ya koi technical issue hai. Browser settings check karo.");
      }
    }

    function startDetection() {
      if (detectionInterval) clearInterval(detectionInterval);

      const displaySize = { width: video.width, height: video.height };
      faceapi.matchDimensions(canvas, displaySize);

      detectionInterval = setInterval(async () => {
        if (!modelsLoaded || !video.videoWidth) return;

        const detections = await faceapi.detectAllFaces(video, new faceapi.TinyFaceDetectorOptions())
          .withFaceLandmarks()
          .withFaceExpressions();

        const resized = faceapi.resizeResults(detections, displaySize);

        // Draw on canvas
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        faceapi.draw.drawDetections(canvas, resized);
        faceapi.draw.drawFaceLandmarks(canvas, resized);

        if (detections.length > 0) {
          const expr = detections[0].expressions;
          
          // Sabse strong emotion
          let maxEmo = Object.keys(expr).reduce((a, b) => expr[a] > expr[b] ? a : b);
          let conf = (expr[maxEmo] * 100).toFixed(1);

          moodText.textContent = emotionMap[maxEmo] || maxEmo.toUpperCase();
          confidenceText.innerHTML = `Confidence: <strong>${conf}%</strong>`;

          // Top 3 emotions dikhane ke liye
          let top3 = Object.entries(expr)
            .sort((a,b) => b[1] - a[1])
            .slice(0,3)
            .map(([emo, val]) => `${emotionMap[emo] || emo}: ${(val*100).toFixed(0)}%`)
            .join(" | ");

          probsText.innerHTML = `<strong>Top Emotions:</strong><br>${top3}`;
        } else {
          moodText.textContent = "Face nahi detect ho raha";
          confidenceText.innerHTML = "";
          probsText.innerHTML = "Apna chehra clearly camera ke saamne rakho aur achha lighting rakho";
        }
      }, 100);
    }

    function stopCamera() {
      if (detectionInterval) clearInterval(detectionInterval);
      if (currentStream) {
        currentStream.getTracks().forEach(t => t.stop());
        currentStream = null;
      }
      video.srcObject = null;
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      moodText.textContent = "Camera band";
      probsText.innerHTML = "";
    }

    window.onload = () => {
      statusText.textContent = "Status: Ready | Camera Start Karo button dabao";
    };

    window.onbeforeunload = stopCamera;
  </script>
</body>
</html>
